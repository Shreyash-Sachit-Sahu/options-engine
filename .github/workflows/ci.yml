name: CI — Options Pricing Engine

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. Build C++ Pricer ──────────────────────────────────────────────────
  build_cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install pybind11 numpy scipy

      - name: Configure CMake
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -Dpybind11_DIR=$(python -c "import pybind11; print(pybind11.get_cmake_dir())")

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Verify module loads
        run: |
          python -c "
          import pricer
          price = pricer.bs_call(100, 100, 1, 0.05, 0.2)
          print(f'bs_call result: {price:.6f}')
          assert abs(price - 10.4506) < 0.001, f'Unexpected price: {price}'
          print('C++ pricer OK')
          "

      - name: Upload pricer module
        uses: actions/upload-artifact@v4
        with:
          name: pricer-module
          path: "*.so"

  # ─── 2. Python Tests ─────────────────────────────────────────────────────
  test_python:
    runs-on: ubuntu-latest
    needs: build_cpp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Download pricer module
        uses: actions/download-artifact@v4
        with:
          name: pricer-module

      - name: Run pricer tests
        run: python -m pytest tests/test_pricer.py -v --tb=short

      - name: Run environment tests
        # Obs space is now 11-dim following the expansion from 7-dim
        run: python -m pytest tests/test_environment.py -v --tb=short

      - name: Run API tests
        run: python -m pytest tests/test_api.py -v --tb=short

      - name: Coverage report
        run: |
          python -m pytest tests/ --cov=src --cov=environment --cov=api \
            --cov-report=term-missing -v

  # ─── 3. Benchmark ────────────────────────────────────────────────────────
  benchmark:
    runs-on: ubuntu-latest
    needs: build_cpp
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pybind11 numpy scipy

      - name: Download pricer module
        uses: actions/download-artifact@v4
        with:
          name: pricer-module

      - name: Run benchmark
        run: |
          python -c "
          import pricer, time

          # Warm-up
          for _ in range(1000):
              pricer.bs_call(100, 100, 1, 0.05, 0.2)

          n = 1_000_000
          start = time.perf_counter()
          for _ in range(n):
              pricer.bs_call(100, 100, 1, 0.05, 0.2)
          elapsed = time.perf_counter() - start

          print(f'{n:,} BSM calls: {elapsed*1000:.1f}ms ({elapsed/n*1e6:.3f}us/call)')

          # CI runners are slower than local — allow 2000ms on CI vs 400ms local
          limit_ms = 2000
          assert elapsed < limit_ms / 1000, f'Benchmark FAILED: {elapsed*1000:.0f}ms > {limit_ms}ms'
          print('Benchmark PASSED')
          "

  # ─── 4. Baseline Smoke Test ───────────────────────────────────────────────
  # Runs a quick delta hedger backtest to verify the environment and baselines
  # are functioning correctly after any code changes. Does not require a trained
  # SAC model — tests the simulation pipeline end-to-end.
  backtest_ci:
    runs-on: ubuntu-latest
    needs: test_python
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download pricer module
        uses: actions/download-artifact@v4
        with:
          name: pricer-module

      - name: Verify obs space is 11-dim
        run: |
          python -c "
          from environment.options_env import OptionsHedgingEnv
          env = OptionsHedgingEnv()
          obs, _ = env.reset(seed=42)
          assert obs.shape == (11,), f'Expected 11-dim obs, got {obs.shape}'
          print(f'Obs space: {env.observation_space.shape} — OK')
          "

      - name: Run baseline backtest smoke test
        run: |
          python -c "
          from environment.options_env import OptionsHedgingEnv
          from environment.baselines import DeltaHedger, evaluate_agent

          env = OptionsHedgingEnv(seed=42)
          agent = DeltaHedger()
          result = evaluate_agent(env, agent, n_episodes=200)

          sharpe = result.get('mean_episode_sharpe', result.get('sharpe_ratio', 0))
          print(f'DeltaHedger Sharpe: {sharpe:.4f}')
          print(f'Mean PnL: {result[\"mean_pnl\"]:.4f}')

          # Smoke test only — Sharpe can be negative on short random-seed runs
          assert sharpe > -5.0, f'DeltaHedger Sharpe implausibly low: {sharpe:.4f}'
          assert abs(result.get('mean_pnl', 0)) < 100.0, 'Mean PnL implausibly large'
          print('Baseline backtest PASSED')
          "

      - name: Verify market simulators
        run: |
          python -c "
          from environment.market_sim import (
              GBMSimulator, HestonSimulator, MertonJumpDiffusionSimulator
          )
          import numpy as np

          for SimClass, name, kwargs in [
              (GBMSimulator, 'GBM', {}),
              (HestonSimulator, 'Heston', {'v0': 0.04, 'kappa': 2.0, 'theta': 0.04, 'xi': 0.3, 'rho': -0.7}),
              (MertonJumpDiffusionSimulator, 'Jump', {'lam': 1.0, 'mu_j': -0.1, 'sigma_j': 0.15}),
          ]:
              sim = SimClass(S0=100.0, mu=0.05, sigma=0.2, seed=42, **kwargs)
              sim.reset()
              prices = [100.0]
              for _ in range(30):
                  p, _ = sim.step()
                  prices.append(p)
              assert len(prices) == 31
              assert all(p > 0 for p in prices), f'{name}: negative prices'
              print(f'{name}: OK — final price {prices[-1]:.2f}')
          "