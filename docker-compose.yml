version: "3.9"

services:
  api:
    build: .
    command: >
      python -m uvicorn api.main:app
      --host 0.0.0.0
      --port 8000
      --log-level info
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./agent/models:/app/agent/models
    working_dir: /app
    env_file: .env
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  dashboard:
    build: .
    command: >
      streamlit run dashboard/app.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    working_dir: /app
    env_file: .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy